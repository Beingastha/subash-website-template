<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Principal's Message — Govt. HSS Excellence, Bhopal</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'gse-green': 'var(--color-primary, #006633)',
            'gse-green-light': 'var(--color-primary-light, #008844)',
            'gse-green-dark': 'var(--color-primary-dark, #004D26)',
            'gse-gold': 'var(--color-secondary, #D4AF37)',
            'gse-gold-light': 'var(--color-secondary-light, #E5C754)',
            'gse-gold-dark': 'var(--color-secondary-dark, #B8962E)',
            'gse-cream': '#F5F5DC',
            'gse-offwhite': '#FAFAF5',
            'gse-charcoal': '#1A1A2E',
            'gse-gray': '#4A4A5A',
            'gse-border': '#E0E0D0',
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css?v=1.4">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen flex flex-col antialiased bg-white text-gse-charcoal">
  <header id="main-header"></header>

  <!-- Hero Banner -->
  <section class="relative h-[35vh] md:h-[45vh] flex items-center justify-center overflow-hidden">
    <div class="absolute inset-0 z-0 bg-gradient-to-br from-gse-green-dark via-gse-green to-gse-green-dark"></div>
    <div class="absolute inset-0 pattern-overlay"></div>
    <div class="relative z-10 text-center px-4">
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold text-white mb-4">
        Principal's <span class="text-gse-gold">Message</span>
      </h1>
      <p class="text-gray-200 text-lg max-w-2xl mx-auto">
        Leading with vision, character, and a commitment to academic excellence
      </p>
    </div>
  </section>

  <main class="flex-1">
    <section class="py-12 md:py-16 bg-gse-offwhite">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
          
          <!-- Principal Card & Info -->
          <div class="lg:col-span-1 animate-on-scroll-left">
            <div class="bg-white rounded-xl shadow-md p-6 border border-gse-border text-center">
              <div class="w-40 h-40 rounded-full bg-gse-green/10 border-4 border-gse-gold mx-auto mb-4 flex items-center justify-center overflow-hidden">
                <img id="principal-img" src="" alt="Principal Sudhakar Parashar" class="w-full h-full object-cover object-top" />
              </div>
              <h3 id="principal-name" class="text-xl font-bold text-gse-charcoal mb-1"></h3>
              <p id="principal-title" class="text-gse-green font-semibold text-sm mb-3">Principal</p>
              
              <div class="border-t border-gse-border pt-4 text-left space-y-2.5">
                <div class="flex items-center gap-2">
                  <i data-lucide="book-open" class="w-4 h-4 text-gse-gold shrink-0"></i>
                  <span id="principal-qual" class="text-gse-gray text-sm"></span>
                </div>
                <div class="flex items-center gap-2">
                  <i data-lucide="clock" class="w-4 h-4 text-gse-gold shrink-0"></i>
                  <span id="principal-exp" class="text-gse-gray text-sm"></span>
                </div>
              </div>
            </div>

            <!-- Vision / Mission -->
            <div class="bg-gradient-to-br from-gse-green to-gse-green-dark rounded-xl p-6 text-white mt-6">
              <h3 class="text-lg font-bold text-gse-gold mb-3 flex items-center gap-2">
                <i data-lucide="eye" class="w-5 h-5"></i> Vision
              </h3>
              <p id="principal-vision" class="text-gray-300 text-sm leading-relaxed mb-6"></p>
              
              <h3 class="text-lg font-bold text-gse-gold mb-3 flex items-center gap-2 border-t border-white/10 pt-4">
                <i data-lucide="target" class="w-5 h-5"></i> Mission
              </h3>
              <p id="principal-mission" class="text-gray-300 text-sm leading-relaxed"></p>
            </div>
          </div>

          <!-- Principal Message Content -->
          <div class="lg:col-span-2 animate-on-scroll-right">
            <div class="bg-white rounded-xl shadow-md p-6 md:p-8">
              <h2 class="text-2xl md:text-3xl font-bold text-gse-charcoal mb-2 gold-accent-line">
                Welcome to Our School
              </h2>
              <div class="h-1 w-16 bg-gse-gold mb-6 rounded-full"></div>
              
              <!-- Message Paragraphs -->
              <div id="message-content" class="space-y-4 text-gse-gray leading-relaxed text-sm md:text-base">
                <!-- Rendered dynamically -->
              </div>

              <!-- Signature -->
              <div class="border-t border-gse-border pt-6 mt-8">
                <p class="text-gse-charcoal font-bold text-base" id="sig-name"></p>
                <p class="text-gse-green font-semibold text-sm">Principal</p>
                <p class="text-gse-gray text-xs" id="sig-school"></p>
              </div>
            </div>
          </div>

        </div>
      </div>
    </section>
  </main>

  <footer id="main-footer"></footer>

  <script src="js/data.js?v=1.4"></script>
  <script src="js/app.js?v=1.4"></script>
  <script>
    function initPrincipal(data) {
      const p = data.principal;
      document.getElementById('principal-name').textContent = p.name;
      document.getElementById('principal-qual').textContent = p.qualification;
      document.getElementById('principal-exp').textContent = p.experience;
      document.getElementById('principal-vision').textContent = p.vision;
      document.getElementById('principal-mission').textContent = p.mission;

      // Principal Image
      if (document.getElementById('principal-img')) {
        document.getElementById('principal-img').src = getImagePath(data.images.principal);
      }

      // Message paragraphs
      const messageContent = document.getElementById('message-content');
      messageContent.innerHTML = p.message.split('\n\n').map(para => `
        <p>${para}</p>
      `).join('');

      // Signature
      document.getElementById('sig-name').textContent = p.name;
      document.getElementById('sig-school').textContent = data.school.fullName;

      lucide.createIcons();
    }

    window.addEventListener('DOMContentLoaded', async () => {
      const data = await loadSchoolData();
      if (data) {
        renderNavigation('principal', data);
        renderFooter(data);
        initPrincipal(data);
        initScrollReveal();
      }
    });
  </script>
</body>
</html>
