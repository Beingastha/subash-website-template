<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circulars & Notices — Govt. HSS Excellence, Bhopal</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'gse-green': 'var(--color-primary, #006633)',
            'gse-green-light': 'var(--color-primary-light, #008844)',
            'gse-green-dark': 'var(--color-primary-dark, #004D26)',
            'gse-gold': 'var(--color-secondary, #D4AF37)',
            'gse-gold-light': 'var(--color-secondary-light, #E5C754)',
            'gse-gold-dark': 'var(--color-secondary-dark, #B8962E)',
            'gse-cream': '#F5F5DC',
            'gse-offwhite': '#FAFAF5',
            'gse-charcoal': '#1A1A2E',
            'gse-gray': '#4A4A5A',
            'gse-border': '#E0E0D0',
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen flex flex-col antialiased bg-white text-gse-charcoal">
  <header id="main-header"></header>

  <!-- Hero Banner -->
  <section class="relative h-[35vh] md:h-[45vh] flex items-center justify-center overflow-hidden">
    <div class="absolute inset-0 z-0 bg-gradient-to-br from-gse-green-dark via-gse-green to-gse-green-dark"></div>
    <div class="absolute inset-0 pattern-overlay"></div>
    <div class="relative z-10 text-center px-4">
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold text-white mb-4">
        Circulars & <span class="text-gse-gold">Notices</span>
      </h1>
      <p class="text-gray-200 text-lg max-w-2xl mx-auto">
        Stay updated with the latest announcements, schedules, and official circulars from the school administration.
      </p>
    </div>
  </section>

  <main class="flex-1">
    <section class="py-12 md:py-16 bg-gse-offwhite">
      <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <!-- Filter & Search Controls -->
        <div class="bg-white rounded-xl shadow-md p-6 border border-gse-border mb-8 animate-on-scroll">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-center">
            <!-- Search bar -->
            <div class="relative">
              <input type="text" id="notice-search" placeholder="Search notices..." class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-gse-border focus:outline-none focus:border-gse-green text-sm text-gse-charcoal transition-colors" />
              <i data-lucide="search" class="w-4 h-4 text-gse-gray absolute left-3.5 top-3.5"></i>
            </div>
            
            <!-- Filters -->
            <div class="flex items-center justify-between md:justify-end gap-6">
              <label class="flex items-center gap-2 cursor-pointer text-sm font-medium text-gse-gray">
                <input type="checkbox" id="filter-important" class="w-4.5 h-4.5 rounded border-gse-border text-gse-green focus:ring-gse-green cursor-pointer" />
                <span>Show Important Only</span>
              </label>
              
              <button id="clear-filters" class="text-xs font-semibold text-gse-green hover:underline">
                Clear Filters
              </button>
            </div>
          </div>
        </div>

        <!-- Notices List Container -->
        <div id="notices-list-container" class="space-y-6">
          <!-- Rendered dynamically -->
        </div>

        <!-- Empty state -->
        <div id="notices-empty-state" class="hidden text-center py-16 bg-white rounded-xl border border-gse-border shadow-md animate-on-scroll">
          <i data-lucide="bell-off" class="w-12 h-12 text-gse-gray mx-auto mb-4"></i>
          <h3 class="text-lg font-bold text-gse-charcoal mb-1">No Notices Found</h3>
          <p class="text-gse-gray text-sm">Try adjusting your filters or search term to find what you're looking for.</p>
        </div>

      </div>
    </section>
  </main>

  <footer id="main-footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    let allNotices = [];

    function renderNoticesList(noticesToRender, highlightId) {
      const container = document.getElementById('notices-list-container');
      const emptyState = document.getElementById('notices-empty-state');
      
      if (noticesToRender.length === 0) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      
      container.innerHTML = noticesToRender.map(notice => {
        const isHighlighted = notice.id === highlightId;
        const highlightClass = isHighlighted ? 'border-2 border-gse-gold ring-4 ring-gse-gold/15 bg-gse-cream/20 shadow-lg scale-[1.01]' : 'border-gse-border hover:border-gse-green bg-white shadow-md';
        
        return `
          <div id="notice-${notice.id}" class="notice-card-detail rounded-xl p-6 md:p-8 transition-all duration-300 flex flex-col md:flex-row gap-6 items-start border ${highlightClass}">
            <!-- Date Column -->
            <div class="flex md:flex-col items-center gap-2 shrink-0 md:w-28 text-center md:border-r border-gse-border/55 pr-0 md:pr-6">
              <div class="w-10 h-10 rounded-full bg-gse-green/10 flex items-center justify-center text-gse-green shrink-0">
                <i data-lucide="calendar" class="w-5 h-5"></i>
              </div>
              <span class="text-xs text-gse-gray font-semibold leading-tight text-left md:text-center">${notice.date}</span>
            </div>

            <!-- Content Column -->
            <div class="flex-1">
              <div class="flex items-center gap-3 mb-2 flex-wrap">
                <h3 class="text-lg md:text-xl font-bold text-gse-charcoal leading-snug">${notice.title}</h3>
                ${notice.important ? '<span class="px-2.5 py-0.5 text-[10px] font-bold bg-red-100 text-red-700 rounded-full flex items-center gap-1 uppercase tracking-wider"><i data-lucide="alert-circle" class="w-3 h-3"></i> Important</span>' : ''}
              </div>
              <p class="text-gse-gray text-sm md:text-base leading-relaxed whitespace-pre-wrap">${notice.description}</p>
            </div>
          </div>
        `;
      }).join('');

      lucide.createIcons();

      // If we highlighted a card, scroll to it smoothly
      if (highlightId) {
        setTimeout(() => {
          const element = document.getElementById(`notice-${highlightId}`);
          if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }, 300);
      }
    }

    function initNotices(data) {
      allNotices = data.notices || [];
      
      // Parse URL params for highlight ID
      const urlParams = new URLSearchParams(window.location.search);
      const highlightId = parseInt(urlParams.get('id'), 10);

      // Initial Render
      renderNoticesList(allNotices, highlightId);

      // Search Filter
      const searchInput = document.getElementById('notice-search');
      const importantCheckbox = document.getElementById('filter-important');
      
      function handleFilters() {
        const searchTerm = searchInput.value.toLowerCase().trim();
        const importantOnly = importantCheckbox.checked;

        const filtered = allNotices.filter(notice => {
          const matchesSearch = notice.title.toLowerCase().includes(searchTerm) || 
                                notice.description.toLowerCase().includes(searchTerm);
          const matchesImportant = !importantOnly || notice.important;
          
          return matchesSearch && matchesImportant;
        });

        renderNoticesList(filtered);
      }

      searchInput.addEventListener('input', handleFilters);
      importantCheckbox.addEventListener('change', handleFilters);

      // Clear Filters
      document.getElementById('clear-filters').addEventListener('click', () => {
        searchInput.value = '';
        importantCheckbox.checked = false;
        renderNoticesList(allNotices);
      });
    }

    window.addEventListener('DOMContentLoaded', async () => {
      const data = await loadSchoolData();
      if (data) {
        renderNavigation('about', data); // Sets active navbar state under 'About' (dropdown active)
        renderFooter(data);
        initNotices(data);
        initScrollReveal();
      }
    });
  </script>
</body>
</html>
